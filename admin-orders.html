<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vale-Shop Admin">
    <meta name="theme-color" content="#0f1a1d">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Vale-Shop - Panel Administrativo</title>

    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./assets/icons/icon-512x512.png">
    <link rel="stylesheet" href="./assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="admin-header">
        <div class="admin-header-content">
            <h1><i class="fas fa-chalkboard-user"></i> Panel Administrativo</h1>
            <div class="admin-actions">
                <button class="btn-notification" id="test-notification-btn"><i class="fas fa-bell"></i> Probar</button>
                <button class="btn-notification" id="refresh-btn"><i class="fas fa-sync-alt"></i> Actualizar</button>
                <a href="/products.html" class="btn-notification"><i class="fas fa-store"></i> Tienda</a>
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card"><h3>Total Pedidos</h3><div class="stat-value" id="total-orders">0</div></div>
        <div class="stat-card"><h3>Pendientes</h3><div class="stat-value" id="pending-orders">0</div></div>
        <div class="stat-card"><h3>Procesando</h3><div class="stat-value" id="processing-orders">0</div></div>
        <div class="stat-card"><h3>Completados Hoy</h3><div class="stat-value" id="completed-today">0</div></div>
        <div class="stat-card"><h3>Ingresos Hoy</h3><div class="stat-value" id="revenue-today">$0</div></div>
    </div>

    <div class="filters-container">
        <div class="filter-buttons">
            <button class="filter-btn active" data-status="all">Todos</button>
            <button class="filter-btn" data-status="pending">Pendientes</button>
            <button class="filter-btn" data-status="processing">Procesando</button>
            <button class="filter-btn" data-status="completed">Completados</button>
            <button class="filter-btn" data-status="cancelled">Cancelados</button>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="orders-table-container">
        <div id="orders-content">
            <div class="loading"><i class="fas fa-spinner"></i><p>Cargando pedidos...</p></div>
        </div>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2><i class="fas fa-receipt"></i> Detalles del Pedido</h2><button class="close-modal">&times;</button></div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Importar Firebase y admin-orders.js -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js",
                "firebase/messaging": "https://www.gstatic.com/firebasejs/10.14.0/firebase-messaging.js"
            }
        }
    </script>

    <script type="module" src="./assets/js/admin-orders.js"></script>
</body>

</html>
